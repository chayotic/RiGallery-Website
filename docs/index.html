<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ri Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100;300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="logo">RiGallery</div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-content">
        <h1 class="slogan">Moments That Matter</h1>
        <p class="tagline">Relive your favorite memories with a clean, modern gallery experience.</p>
        
        <div class="featured-card">
          <div class="carousel">
            <img src="" alt="Preview 1" />
            <img src="" alt="Preview 2" />
            <img src="" alt="Preview 3" />
          </div>
        </div>
      </div>
      <button class="download-button">
        Download
        <span class="ripple"></span>
      </button>
    </section>
  </main>

  <footer>
    <p>© 2025 RiGallery. All memories preserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
